{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 md:px-8">
    <section class="py-16 md:py-24">
        <div class="border-l-4 border-brand-red pl-6 mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-brand-red">產品目錄</h1>
            <p class="text-gray-600 text-lg md:text-xl">精選優質漢方藥材與養生產品，品質誠信保證</p>
        </div>
        
        <!-- Filter Bar -->
        <div class="flex flex-wrap justify-center gap-4 mb-16">
            <button class="filter-btn active px-8 py-3 rounded-full text-lg font-semibold transition-all border-2 border-brand-red" 
                    hx-get="/htmx/products" 
                    hx-target="#product-grid"
                    @click="$el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-brand-red', 'text-white')); $el.classList.add('active', 'bg-brand-red', 'text-white')">
                全部產品
            </button>
            {% for category in categories %}
                <button class="filter-btn px-8 py-3 rounded-full text-lg font-semibold transition-all border-2 border-brand-red text-brand-red hover:bg-brand-red hover:text-white" 
                        hx-get="/htmx/products?category_id={{ category.id }}" 
                        hx-target="#product-grid"
                        @click="$el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-brand-red', 'text-white')); $el.classList.add('active', 'bg-brand-red', 'text-white')">
                    {{ category.name_zh }}
                </button>
            {% endfor %}
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 min-h-[400px]">
            {% include "partials/product_grid.html" %}
        </div>

        <!-- CTA Section -->
        <div class="mt-24 bg-brand-red text-white p-8 md:p-16 rounded-2xl shadow-xl flex flex-col lg:flex-row items-center justify-between gap-12">
            <div class="lg:w-2/3">
                <h2 class="text-brand-khaki text-3xl md:text-4xl font-bold mb-6">需要批發或客製化配藥？</h2>
                <p class="text-lg md:text-xl opacity-90 leading-relaxed">我們提供各大中醫診所與餐飲業優質藥材批發，亦可根據您的配方進行專業抓藥與代煎服務。</p>
            </div>
            <div class="lg:w-1/3 text-center lg:text-right">
                <a href="/contact" class="btn btn-primary text-xl px-12 py-4">立即洽談</a>
            </div>
        </div>
    </section>
</div>

<style>
    .filter-btn.active {
        background-color: #A33327;
        color: white;
    }
</style>
{% endblock %}
