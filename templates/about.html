{% extends "base.html" %}

{% block content %}
<section>
    <h1 style="color: var(--color-red); margin-bottom: 2rem;">關於我們</h1>
    <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h2 style="color: var(--color-gold); margin-bottom: 1rem;">公司簡介</h2>
        <p style="margin-bottom: 2rem;">
            金燕 (Chingyen) 成立於 1990 年代，始終秉持著「誠信、專業、守護健康」的經營理念。我們專注於高品質中藥材的進口與推廣，並結合現代化管理與傳統中醫藥精華，致力於為每一位客戶提供最安全、最有效的漢方調理方案。
        </p>
        
        <h2 style="color: var(--color-gold); margin-bottom: 1rem;">經營理念</h2>
        <p style="margin-bottom: 2rem;">
            我們相信，健康的根本在於「調和」。透過天然的藥材與專業的醫理，我們幫助客戶找回身體的平衡。
        </p>

        <h2 style="color: var(--color-gold); margin-bottom: 1rem;">執照認證</h2>
        <p>
            我們所有的醫師均具備合格執照，所有進口藥材均通過嚴格的國家級安全檢驗，確保無重殘、無農藥殘留。
        </p>
    </div>
</section>
{% endblock %}
