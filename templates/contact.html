{% extends "base.html" %}

{% block content %}
<section>
    <h1 style="color: var(--color-red); margin-bottom: 2rem;">聯絡我們</h1>
    <div class="grid">
        <div class="card" style="padding: 2rem;">
            <h3 style="color: var(--color-red); margin-bottom: 1rem;">門市資訊</h3>
            <p><strong>地址：</strong> 您的門市詳細地址</p>
            <p><strong>電話：</strong> +60 X-XXXX XXXX</p>
            <p><strong>營業時間：</strong> 週一至週六 09:00 - 18:00</p>
        </div>
        <div class="card" style="padding: 2rem;">
            <h3 style="color: var(--color-red); margin-bottom: 1rem;">線上諮詢</h3>
            <p>如果您有任何產品或中醫調理的問題，歡迎撥打電話或親臨門市，我們的專業團隊將竭誠為您服務。</p>
        </div>
    </div>
</section>
{% endblock %}
